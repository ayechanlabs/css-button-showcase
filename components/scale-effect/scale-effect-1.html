<button type="button" id="" class="hover-effect">Hover Me</button>
<style>
    .hover-effect {
        background: none;
        font-size: 40px;
        border: 5px solid #000;

        padding: 40px 80px;

        position: relative;

        overflow: hidden;
    }

    .hover-effect::before {
        content: 'Press Me';

        width: 100%;
        height: 100%;
        background-color: steelblue;
        color: #fff;

        /* text-align: center;
        align-content: center; */
        display: flex;
        justify-content: center;
        align-items: center;

        position: absolute;
        top: 0;
        left: 0;

        /* transform: translateZ(500px); */
        transform: scale(5);
        opacity: 0;

        transition: all 0.5s ease-in
    }

    .hover-effect:hover::before {
        /* transform: translate(0); */
        transform: scale(1);
        opacity: 1;
    }

    .hover-effect:active::before {
        content: "Thank You";
    }
</style>
