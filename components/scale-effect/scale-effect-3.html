<button type="button" id="" class="hover-effect">Hover Me</button>
<style>
    .hover-effect {
        perspective: 500px;
        
        background: none;
        font-size: 40px;
        border: 5px solid #000;
        color: transparent;

        padding: 40px 80px;

        position: relative;

        overflow: hidden;
    }

    .hover-effect::before {
        content: 'Hover Me';

        width: 100%;
        height: 100%;
        background-color: steelblue;
        color: #fff;

        position: absolute;
        top: 0;
        left: 0;

        display: flex;
        justify-content: center;
        align-items: center;

        transform: scale(1);

        transition: transform 0.5s ease-out
    }

    .hover-effect:hover::before {
        transform: scale(0);
    }

    .hover-effect::after {
        content: 'Press Me';

        width: 100%;
        height: 100%;
        background-color: yellow;
        color: #000;

        position: absolute;
        left: 0;
        top: 0;

        display: flex;
        justify-content: center;
        align-items: center;

        transform: scale(0);

        transition: transform 0.5s ease-in;
    }

    .hover-effect:hover::after {
        transform: scale(1);
    }

    .hover-effect:active::after {
        content: "Thank You";
    }
</style>
