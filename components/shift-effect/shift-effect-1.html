<button type="button" id="" class="shift-effect">Hover Me</button>
<style>
    .shift-effect {
        background: none;
        font-size: 40px;
        border: 5px solid #000;
        color: transparent;

        padding: 40px 80px;

        position: relative;

        overflow: hidden;
    }

    .shift-effect::before {
        content: 'Hover Me';

        width: 100%;
        height: 100%;
        background-color: steelblue;
        color: #fff;

        position: absolute;
        top: 0;
        left: 0;

        display: flex;
        justify-content: center;
        align-items: center;

        transition: transform 0.5s ease
    }

    .shift-effect:hover::before {
        transform: translateY(-100%);
    }

    .shift-effect::after {
        content: 'Press Me';

        width: 100%;
        height: 100%;
        background-color: yellow;
        color: #000;

        position: absolute;
        left: 0;
        top: 0;

        display: flex;
        justify-content: center;
        align-items: center;

        transform: translateY(100%);

        transition: transform 0.5s ease;
    }

    .shift-effect:hover::after {
        transform: translateY(0);
    }

    .shift-effect:active::after {
        content: "Thank You";
    }
</style>
