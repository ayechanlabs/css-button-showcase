<button type="button" id="" class="shift-effect">Hover Me</button>
<style>
    .shift-effect {
        background: none;
        font-size: 40px;
        border: 5px solid #000;
        color: transparent;

        padding: 40px 80px;

        position: relative;

        overflow: hidden;
    }

    .shift-effect::before {
        content: 'Hover Me';

        width: 100%;
        height: 100%;
        background-color: steelblue;
        color: #fff;

        position: absolute;
        top: 0;
        left: 0;

        display: flex;
        justify-content: center;
        align-items: center;

        z-index: 1;
        transition: transform 0.5s ease
    }

    .shift-effect:hover::before {
        content: 'Me';

        justify-content: start;

        padding-left: 5px;

        transform: translateX(50%);
    }

    .shift-effect:active::before {
        content: 'You';
    }

    .shift-effect::after {
        content: 'Press';

        width: 100%;
        height: 100%;
        background-color: yellow;
        color: #000;

        position: absolute;
        left: 0;
        top: 0;

        display: flex;
        justify-content: end;
        align-items: center;

        transform: translateX(50%);

        transition: transform 0.3s ease;
    }

    .shift-effect:hover::after {
        padding-right: 5px;

        transform: translateX(-50%);
    }

    .shift-effect:active::after {
        content: "Thank";
    }
</style>
