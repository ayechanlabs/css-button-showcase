<button type="button" class="btn"></button>
<style>
    .btn, .btn::before, .btn::after {
        border-radius: 10px;
    }

    .btn {
        width: 300px;
        height: 80px;
        background: transparent;
        cursor: pointer;

        border: none;

        position: relative;
    }

    .btn::before {
        content: "Hover Me. Then Press Me !!!";
        background: #111111;
        color: #ffffff;

        display: flex;
        justify-content: center;
        align-items: center;

        position: absolute;
        inset: 2.5px;

        z-index: 1;
        transition: all 0.3s linear;
    }

    .btn:active::before {
        background: transparent;
        color: #000000;
    }

    .btn::after {
        content: "";
        background: linear-gradient(
            90deg,
            red,
            green,
            blue,
            yellow,
            purple,
            red
        );
        background-size: 500px 100px;

        position: absolute;
        inset: 0;

        opacity: 0;
        transition: all 0.3s linear;
    }

    .btn:hover::after {
        opacity: 1;

        animation-name: lighting;
        animation-duration: 10s;
        animation-timing-function: linear;
        animation-iteration-count: infinite;
    }

    @keyframes lighting {
        0% {
            background-position: 0;
        }
        50% {
            background-position: 500% 0;
        }
        100% {
            background-position: 0 0;
        }
    }
</style>
