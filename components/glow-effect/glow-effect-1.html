<button type="button" class="btn">Hover Me</button>
<style>
    .btn {
        width: 300px;
        height: 70px;
        background-color: #000000;
        color: #ffffff;
        font-size: 20px;
        text-transform: uppercase;
        letter-spacing: 2px;
        cursor: pointer;
        
        border: 1px solid red;

        position: relative;
        overflow: hidden;
    }

    .btn::before {
        content: "";

        width: 100%;
        height: 100%;
        background: linear-gradient(
            45deg,
            transparent,
            red,
            transparent
        );

        position: absolute;
        left: -100%;
        top: 0;

        transition: left .3s ease-out;
    }

    .btn:hover::before {
        left: 100%;
    }

    .btn:hover {
        /* horizontal-offset, vertical-offset, blur, spread, color */
        box-shadow: 1px 1px 25px 10px red;
    }
</style>
