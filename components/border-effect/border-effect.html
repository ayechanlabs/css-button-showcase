<button type="button" id="" class="border-effect">Hover Me</button>
<style>
    .border-effect {
        background: none;
        font-size: 40px;
        border: 5px solid #000;
        color: #000;

        padding: 40px 80px;

        position: relative;

        transition: color 0.5s ease;
        z-index: 1;
    }

    .border-effect:hover {
        color: #fff;
    }

    .border-effect::after {
        content: '';

        width: 100%;
        height: 30%;
        background-color: #000;

        position: absolute;
        top: 0;
        left: 0;

        border-radius: 0 0 100% 0;

        transition: all 0.5s ease;
        z-index: -1;
    }

    .border-effect:hover::after {
        height: 100%;
        border-radius: 0 0 0 100%;
    }
</style>
