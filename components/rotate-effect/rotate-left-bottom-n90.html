<button type="button" id="hover-effect" class="btn-hover">Hover Me</button>
<style>
    .btn-hover {
        color: #000000;
        font-size: 25px;
        cursor: pointer;

        border: 2px solid #000000;

        padding: 20px 40px;

        position: relative;
        overflow: hidden;
        z-index: 1;

        transition: color 0.5s linear;
    }

    .btn-hover:hover {
        color: #ffffff;
    }

    .btn-hover::before {
        content: '';
        width: 100%;
        height: 100%;
        background-color: steelblue;

        position: absolute;
        left: 0;
        top: 0;

        transform: rotate(-90deg);
        transform-origin: left bottom;
        transition: transform 0.5s linear;

        z-index: -1;
    }

    .btn-hover:hover::before {
        transform: rotate(0deg);
    }
</style>
