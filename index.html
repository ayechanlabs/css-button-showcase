<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button Showcase Gallery</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-okaidia.min.css">
    <link href="./style.css" rel="stylesheet" type="text/css">
</head>
<body>
    <!-- Start - Sidebar for Navigation -->
    <div class="sidebar">
        <h2>Button Effects</h2>

        <nav>
            <ul class="nav-menu">
                <li>
                    <button class="nav-btn active" data-target="effect-fade">Fade Effect</button>
                </li>
                <li class="nav-submenu">
                    <button class="nav-btn">Slide Effect</button>
                    <ul class="submenu">
                        <li>
                            <button class="sub-nav-btn" data-target="slide-center-left">Slide Center-Left</button>
                        </li>
                        <li>
                            <button class="sub-nav-btn" data-target="slide-center-right">Slide Center-Right</button>
                        </li>
                        <li>
                            <button class="sub-nav-btn" data-target="slide-center-bottom">Slide Center-Bottom</button>
                        </li>
                        <li>
                            <button class="sub-nav-btn" data-target="slide-center-top">Slide Center-Top</button>
                        </li>
                        <li>
                            <button class="sub-nav-btn" data-target="slide-left-top">Slide Left-Top</button>
                        </li>
                        <li>
                            <button class="sub-nav-btn" data-target="slide-right-top">Slide Right-Top</button>
                        </li>
                        <li>
                            <button class="sub-nav-btn" data-target="slide-left-bottom">Slide Left-Bottom</button>
                        </li>
                        <li>
                            <button class="sub-nav-btn" data-target="slide-right-bottom">Slide Right-Bottom</button>
                        </li>
                    </ul>
                </li>
                <li>
                    <button class="nav-btn" data-target="effect-glow">Glow Effect</button>
                </li>
                <li>
                    <button class="nav-btn" data-target="effect-3d">3D Effect</button>
                </li>
            </ul>
        </nav>
    </div>
    <!-- End - Sidebar for Navigation -->

    <!-- Start - Display Area for Button Effects -->
    <div class="display-container">
        <header>
            <h1>Interactive Button Effects</h1>
            <p>Select an effect from the sidebar to view it in action and grab the code!</p>
        </header>

        <section id="showcase-container">
            <div class="preview-card">
                <h3>Live Preview</h3>
                <div id="button-space"></div>
            </div>

            <div class="code-snippet-card">
                <h3>Code Snippet</h3>
                <div class="code-container">
                    <pre><code id="code-block" class="language-css">/* CSS Code will appear here. */</code></pre>
                    <button id="copy-btn">Copy Code</button>
                </div>
            </div>
        </section>
    </div>
    <!-- End - Display Area for Button Effects -->

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js"></script>

    <script src="./script.js" type="text/javascript"></script>
</body>
</html>
